<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel-Perfect Neon Snake</title>
    <style>
        :root {
            --bg-color: #0b0f1a;
            --grid-color: rgba(255, 255, 255, 0.03);
            --snake-head: #38bdf8;
            --snake-body: #0ea5e9;
            --food-color: #fb7185;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            /* Match canvas width/height exactly */
            width: 400px;
            height: 400px;
            border: 2px solid #1e293b;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
            background-color: var(--bg-color);
            /* Logic: 400px / 20 tiles = 20px per tile */
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(11, 15, 26, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        button {
            padding: 12px 24px;
            background: var(--snake-head);
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .score-board { margin-bottom: 15px; font-size: 1.2rem; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="score-board">SCORE: <span id="score">0</span></div>

    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="overlay" class="overlay">
            <h1 id="status">NEON SNAKE</h1>
            <button onclick="startGame()">START</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const overlay = document.getElementById("overlay");

        const TILE_SIZE = 20; 
        const TILE_COUNT = 20; // 400 / 20

        let snake, food, dx, dy, nextDx, nextDy, score, gameLoop;

        function startGame() {
            snake = [{x: 10, y: 10}, {x: 10, y: 11}, {x: 10, y: 12}];
            dx = 0; dy = -1;
            nextDx = 0; nextDy = -1;
            score = 0;
            scoreEl.innerText = score;
            overlay.style.display = "none";
            spawnFood();
            
            if(gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, 100);
        }

        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * TILE_COUNT),
                y: Math.floor(Math.random() * TILE_COUNT)
            };
            // Ensure food isn't on snake
            if(snake.some(p => p.x === food.x && p.y === food.y)) spawnFood();
        }

        function update() {
            dx = nextDx;
            dy = nextDy;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Wall Collision
            if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) return gameOver();
            // Self Collision
            if (snake.some(p => p.x === head.x && p.y === head.y)) return gameOver();

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.innerText = score;
                spawnFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Food
            ctx.fillStyle = "#fb7185";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#fb7185";
            ctx.beginPath();
            // Center the circle in the tile
            ctx.arc(food.x * TILE_SIZE + TILE_SIZE/2, food.y * TILE_SIZE + TILE_SIZE/2, 6, 0, Math.PI*2);
            ctx.fill();

            // Draw Snake
            ctx.shadowBlur = 0;
            snake.forEach((part, i) => {
                ctx.fillStyle = i === 0 ? "#38bdf8" : "#0ea5e9";
                if(i === 0) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = "#38bdf8";
                }
                // Rounded rect with a 1px gap to show the grid
                ctx.beginPath();
                ctx.roundRect(
                    part.x * TILE_SIZE + 1, 
                    part.y * TILE_SIZE + 1, 
                    TILE_SIZE - 2, 
                    TILE_SIZE - 2, 
                    4
                );
                ctx.fill();
                ctx.shadowBlur = 0;
            });
        }

        function gameOver() {
            clearInterval(gameLoop);
            document.getElementById("status").innerText = "GAME OVER";
            overlay.style.display = "flex";
        }

        window.addEventListener("keydown", e => {
            if (e.key === "ArrowUp" && dy === 0) { nextDx = 0; nextDy = -1; }
            if (e.key === "ArrowDown" && dy === 0) { nextDx = 0; nextDy = 1; }
            if (e.key === "ArrowLeft" && dx === 0) { nextDx = -1; nextDy = 0; }
            if (e.key === "ArrowRight" && dx === 0) { nextDx = 1; nextDy = 0; }
        });
    </script>
</body>
</html>
